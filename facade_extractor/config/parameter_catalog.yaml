# ─────────────────────────────────────────────────────────────────────────────
#  FACADE EXTRACTOR — Parameter Catalog
#  Runtime-configurable. Add / remove / edit entries freely.
#  No project names, no spec values, no layer names are hardcoded here.
#
#  extraction_type  : LINEAR | COMPOUND | SPACING | COUNT | ANGULAR | ANNOTATION
#  dimension_direction: HORIZONTAL | VERTICAL | ANY
#  relevant_sheet_types: list of PLAN | ELEVATION | SECTION | DETAIL | SCHEDULE
#  relevant_layer_groups: list of groups defined in layer_keywords.yaml
#  spec_value       : null  (leave null unless you want cross-check)
#  spec_tolerance   : null or ± value in same unit
#  confidence_threshold: minimum score to include in output (0.0 – 1.0)
# ─────────────────────────────────────────────────────────────────────────────

